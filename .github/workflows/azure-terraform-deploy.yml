name: Deploy Azure (Terraform)

on:
  push:
    branches: [main]
    paths:
      - 'terraform/azure/**'
      - 'Dockerfile'
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/azure-terraform-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: true
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/azure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend production build (smoke)
        working-directory: frontend
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLERK_PLAN_KEY: premium_subscription
          NEXT_PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL }}
          NEXT_PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Terraform init (Azure backend)
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_SA }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            -backend-config="key=azure-project/terraform.tfstate"

      - name: Select Terraform workspace
        run: |
          terraform workspace select azure || terraform workspace new azure

      # After deleting the app RG / old ACR, state may still point docker_registry_image at the
      # old registry host; refresh fails with "no auth config". Set Actions variable
      # TF_RESET_DOCKER_STATE=true for one run, then clear it after a green deploy.
      - name: Drop stale Docker image state (one-time recovery)
        if: ${{ vars.TF_RESET_DOCKER_STATE == 'true' }}
        run: |
          terraform state rm docker_image.app || true
          terraform state rm docker_registry_image.app || true

      - name: Terraform apply
        env:
          TF_VAR_clerk_publishable_key: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
        run: |
          terraform apply -auto-approve \
            -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}" \
            -var="semgrep_app_token=${{ secrets.SEMGREP_APP_TOKEN }}" \
            -var="docker_image_tag=${{ github.sha }}" \
            -var="public_app_url=${{ vars.PUBLIC_APP_URL }}" \
            -var="public_api_url=${{ vars.PUBLIC_API_URL }}" \
            -var="use_existing_log_analytics_workspace=${{ vars.TF_USE_EXISTING_LOG_ANALYTICS == 'true' }}" \
            -var="use_existing_container_app_environment=${{ vars.TF_USE_EXISTING_CONTAINER_APP_ENV == 'true' }}" \
            -var="existing_container_app_environment_id=${{ vars.TF_EXISTING_CONTAINER_APP_ENV_ID }}" \
            -var="use_existing_container_app=${{ vars.TF_USE_EXISTING_CONTAINER_APP == 'true' }}"

      - name: Application URL
        run: terraform output -raw app_url